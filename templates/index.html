<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>J.A.R.V.İ.S. 1453</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #00d4ff; font-family: 'Courier New', monospace; height: 100vh; display: flex; overflow: hidden; }
        .sol-panel { width: 260px; background: #050a0f; border-right: 1px solid #00d4ff22; display: flex; flex-direction: column; padding: 16px; }
        .logo { font-size: 16px; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 15px #00d4ff; margin-bottom: 4px; }
        .logo-alt { font-size: 8px; letter-spacing: 2px; color: #005f73; margin-bottom: 20px; }
        .yeni-btn { background: transparent; border: 1px solid #00d4ff55; color: #00d4ff; padding: 10px; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; border-radius: 4px; letter-spacing: 2px; margin-bottom: 16px; transition: all 0.3s; }
        .yeni-btn:hover { background: #00d4ff11; border-color: #00d4ff; }
        .sohbet-listesi { flex: 1; overflow-y: auto; }
        .sohbet-listesi::-webkit-scrollbar { width: 3px; }
        .sohbet-listesi::-webkit-scrollbar-thumb { background: #00d4ff22; }
        .sohbet-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s; border: 1px solid transparent; }
        .sohbet-item:hover { background: #00d4ff11; }
        .sohbet-item.aktif { background: #00d4ff15; border-color: #00d4ff33; }
        .sohbet-isim { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sohbet-isim-input { background: transparent; border: none; border-bottom: 1px solid #00d4ff; color: #00d4ff; font-family: 'Courier New', monospace; font-size: 12px; width: 140px; outline: none; }
        .sil-btn { background: none; border: none; color: #00d4ff33; cursor: pointer; font-size: 14px; padding: 2px 4px; transition: color 0.2s; }
        .sil-btn:hover { color: #ff4444; }
        .duzenle-btn { background: none; border: none; color: #00d4ff33; cursor: pointer; font-size: 12px; padding: 2px 4px; transition: color 0.2s; }
        .duzenle-btn:hover { color: #00d4ff; }
        .sag-panel { flex: 1; display: flex; flex-direction: column; }
        .ust-bar { padding: 16px 24px; border-bottom: 1px solid #00d4ff22; display: flex; align-items: center; gap: 12px; }
        .arc-mini { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #00d4ff; box-shadow: 0 0 12px #00d4ff; display: flex; align-items: center; justify-content: center; animation: don 6s linear infinite; }
        @keyframes don { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .arc-mini-ic { width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle, #00d4ff, #003d4f); box-shadow: 0 0 8px #00d4ff; animation: parlat 1.5s infinite; }
        @keyframes parlat { 0%,100% { box-shadow: 0 0 8px #00d4ff; } 50% { box-shadow: 0 0 20px #00d4ff; } }
        .aktif-sohbet-isim { font-size: 14px; letter-spacing: 2px; }
        .chat-alan { flex: 1; overflow-y: auto; padding: 24px; }
        .chat-alan::-webkit-scrollbar { width: 4px; }
        .chat-alan::-webkit-scrollbar-thumb { background: #00d4ff22; }
        .mesaj { margin-bottom: 20px; display: flex; flex-direction: column; }
        .mesaj.jarvis { align-items: flex-start; }
        .mesaj.user { align-items: flex-end; }
        .mesaj-icerik { max-width: 75%; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.8; }
        .jarvis .mesaj-icerik { background: #00d4ff0d; border: 1px solid #00d4ff22; color: #00d4ff; }
        .user .mesaj-icerik { background: #ffffff08; border: 1px solid #ffffff15; color: #ffffffcc; }
        .mesaj-etiket { font-size: 10px; letter-spacing: 2px; margin-bottom: 6px; color: #00d4ff55; }
        .alt-alan { padding: 16px 24px; border-top: 1px solid #00d4ff22; display: flex; gap: 12px; }
        .giris { flex: 1; background: #00d4ff08; border: 1px solid #00d4ff33; color: #00d4ff; padding: 14px 18px; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 6px; outline: none; transition: all 0.3s; }
        .giris:focus { border-color: #00d4ff; box-shadow: 0 0 12px #00d4ff22; }
        .gonder-btn { background: transparent; border: 1px solid #00d4ff; color: #00d4ff; padding: 14px 24px; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; border-radius: 6px; letter-spacing: 2px; transition: all 0.3s; }
        .gonder-btn:hover { background: #00d4ff22; box-shadow: 0 0 15px #00d4ff44; }
        .bos-ekran { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00d4ff22; }
        .bos-logo { font-size: 36px; font-weight: bold; letter-spacing: 8px; margin-bottom: 8px; }
        .bos-alt { font-size: 11px; letter-spacing: 4px; }
        .yukluyor { color: #00d4ff55; font-size: 12px; letter-spacing: 2px; animation: titresin 1s infinite; }
        @keyframes titresin { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .cikis-btn { margin-left: auto; color: #00d4ff33; font-size: 11px; letter-spacing: 2px; text-decoration: none; transition: color 0.3s; }
        .cikis-btn:hover { color: #ff4444; }
    </style>
</head>
<body>
    <div class="sol-panel">
        <div class="logo">J.A.R.V.İ.S. 1453</div>
        <div class="logo-alt">STARK INDUSTRIES</div>
        <button class="yeni-btn" onclick="yeniSohbet()">+ YENİ SOHBET</button>
        <div class="sohbet-listesi" id="sohbet-listesi"></div>
    </div>
    <div class="sag-panel">
        <div class="ust-bar">
            <div class="arc-mini"><div class="arc-mini-ic"></div></div>
            <div class="aktif-sohbet-isim" id="aktif-isim">SOHBET SEÇİN</div>
            <a href="/cikis" class="cikis-btn">ÇIKIŞ</a>
        </div>
        <div id="ana-alan" class="bos-ekran">
            <div class="bos-logo">J.A.R.V.İ.S. 1453</div>
            <div class="bos-alt">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
        </div>
        <div class="alt-alan">
            <input class="giris" id="giris" placeholder="Komut girin efendim..." onkeypress="enterKontrol(event)">
            <button class="gonder-btn" onclick="gonder()">GÖNDER</button>
        </div>
    </div>
    <script>
        let aktifSohbetId = null;

        async function sohbetleriYukle() {
            const res = await fetch('/sohbetler');
            const sohbetler = await res.json();
            const liste = document.getElementById('sohbet-listesi');
            liste.innerHTML = '';
            Object.entries(sohbetler).reverse().forEach(([id, s]) => {
                const div = document.createElement('div');
                div.className = 'sohbet-item' + (id === aktifSohbetId ? ' aktif' : '');
                div.innerHTML = `
                    <span class="sohbet-isim">${s.isim}</span>
                    <button class="duzenle-btn" onclick="isimDuzenle('${id}', this.previousElementSibling)">✎</button>
                    <button class="sil-btn" onclick="sohbetSil('${id}')">✕</button>
                `;
                div.querySelector('.sohbet-isim').addEventListener('click', () => sohbetAc(id));
                liste.appendChild(div);
            });
        }

        async function yeniSohbet() {
            const res = await fetch('/yeni_sohbet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({isim: 'Yeni Sohbet'})
            });
            const veri = await res.json();
            aktifSohbetId = veri.id;
            await sohbetleriYukle();
            await sohbetAc(veri.id);
        }

        async function sohbetAc(id) {
            aktifSohbetId = id;
            const res = await fetch('/sohbetler');
            const sohbetler = await res.json();
            const sohbet = sohbetler[id];
            if (!sohbet) return;
            document.getElementById('aktif-isim').textContent = sohbet.isim.toUpperCase();
            const alan = document.getElementById('ana-alan');
            alan.className = 'chat-alan';
            alan.innerHTML = '';
            if (sohbet.mesajlar && sohbet.mesajlar.length > 0) {
                sohbet.mesajlar.forEach(m => mesajEkle(m.content, m.role === 'user' ? 'user' : 'jarvis', false));
            } else {
                mesajEkle('Sistemler hazır efendim. Size nasıl yardımcı olabilirim?', 'jarvis', false);
            }
            alan.scrollTop = alan.scrollHeight;
            sohbetleriYukle();
        }

        function mesajEkle(metin, tip, scroll = true) {
            const alan = document.getElementById('ana-alan');
            const div = document.createElement('div');
            div.className = 'mesaj ' + tip;
            div.innerHTML = `<div class="mesaj-etiket">${tip === 'jarvis' ? '> JARVIS' : '> SEN'}</div><div class="mesaj-icerik">${metin}</div>`;
            alan.appendChild(div);
            if (scroll) alan.scrollTop = alan.scrollHeight;
        }

        async function gonder() {
            if (!aktifSohbetId) { alert('Lütfen bir sohbet seçin!'); return; }
            const giris = document.getElementById('giris');
            const komut = giris.value.trim();
            if (!komut) return;
            giris.value = '';
            mesajEkle(komut, 'user');
            const yukluyor = document.createElement('div');
            yukluyor.className = 'mesaj jarvis';
            yukluyor.innerHTML = '<div class="mesaj-etiket">> JARVIS</div><div class="mesaj-icerik yukluyor">İşleniyor...</div>';
            document.getElementById('ana-alan').appendChild(yukluyor);
            document.getElementById('ana-alan').scrollTop = document.getElementById('ana-alan').scrollHeight;
            const res = await fetch('/komut', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({komut, sohbet_id: aktifSohbetId})
            });
            const veri = await res.json();
            yukluyor.remove();
            mesajEkle(veri.cevap, 'jarvis');
        }

        async function sohbetSil(id) {
            await fetch('/sohbet_sil', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            if (aktifSohbetId === id) {
                aktifSohbetId = null;
                document.getElementById('ana-alan').className = 'bos-ekran';
                document.getElementById('ana-alan').innerHTML = '<div class="bos-logo">J.A.R.V.İ.S. 1453</div><div class="bos-alt">JUST A RATHER VERY INTELLIGENT SYSTEM</div>';
                document.getElementById('aktif-isim').textContent = 'SOHBET SEÇİN';
            }
            sohbetleriYukle();
        }

        function isimDuzenle(id, span) {
            const mevcutIsim = span.textContent;
            const input = document.createElement('input');
            input.className = 'sohbet-isim-input';
            input.value = mevcutIsim;
            span.replaceWith(input);
            input.focus();
            input.addEventListener('blur', async () => {
                const yeniIsim = input.value.trim() || mevcutIsim;
                await fetch('/sohbet_isim', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, isim: yeniIsim})
                });
                if (aktifSohbetId === id) document.getElementById('aktif-isim').textContent = yeniIsim.toUpperCase();
                sohbetleriYukle();
            });
            input.addEventListener('keypress', e => { if (e.key === 'Enter') input.blur(); });
        }

        function enterKontrol(e) { if (e.key === 'Enter') gonder(); }

        sohbetleriYukle();
    </script>
</body>
</html>
