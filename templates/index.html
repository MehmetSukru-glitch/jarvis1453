<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.İ.S. 1453</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; color: #1a1a1a; font-family: 'Courier New', monospace; height: 100vh; display: flex; overflow: hidden; }
        
        .sol-panel { width: 260px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding: 16px; }
        .logo { font-size: 14px; font-weight: bold; letter-spacing: 4px; color: #1a1a1a; margin-bottom: 20px; }
        .yeni-btn { background: #1a1a1a; border: none; color: #fff; padding: 10px; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; border-radius: 6px; letter-spacing: 2px; margin-bottom: 16px; transition: all 0.3s; }
        .yeni-btn:hover { background: #333; }
        .sohbet-listesi { flex: 1; overflow-y: auto; }
        .sohbet-listesi::-webkit-scrollbar { width: 3px; }
        .sohbet-listesi::-webkit-scrollbar-thumb { background: #ddd; }
        .sohbet-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s; border: 1px solid transparent; }
        .sohbet-item:hover { background: #f5f5f5; }
        .sohbet-item.aktif { background: #f0f0f0; border-color: #ddd; }
        .sohbet-isim { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1a1a1a; }
        .sohbet-isim-input { background: transparent; border: none; border-bottom: 1px solid #1a1a1a; color: #1a1a1a; font-family: 'Courier New', monospace; font-size: 12px; width: 140px; outline: none; }
        .sil-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 2px 4px; transition: color 0.2s; }
        .sil-btn:hover { color: #e74c3c; }
        .duzenle-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 12px; padding: 2px 4px; transition: color 0.2s; }
        .duzenle-btn:hover { color: #1a1a1a; }

        .sag-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .ust-bar { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 12px; background: #fff; }
        .arc-mini { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; animation: don 6s linear infinite; flex-shrink: 0; }
        @keyframes don { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .arc-mini-ic { width: 14px; height: 14px; border-radius: 50%; background: #1a1a1a; animation: parlat 1.5s infinite; }
        @keyframes parlat { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .aktif-sohbet-isim { font-size: 13px; letter-spacing: 2px; color: #1a1a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cikis-btn { margin-left: auto; color: #aaa; font-size: 11px; letter-spacing: 2px; text-decoration: none; transition: color 0.3s; flex-shrink: 0; }
        .cikis-btn:hover { color: #e74c3c; }

        .chat-alan { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .chat-alan::-webkit-scrollbar { width: 4px; }
        .chat-alan::-webkit-scrollbar-thumb { background: #ddd; }
        .mesaj { margin-bottom: 16px; display: flex; flex-direction: column; }
        .mesaj.jarvis { align-items: flex-start; }
        .mesaj.user { align-items: flex-end; }
        .mesaj-icerik { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.8; }
        .jarvis .mesaj-icerik { background: #fff; border: 1px solid #e0e0e0; color: #1a1a1a; }
        .user .mesaj-icerik { background: #1a1a1a; color: #fff; }
        .mesaj-etiket { font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; color: #aaa; }

        .alt-alan { padding: 16px 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; background: #fff; }
        .giris { flex: 1; background: #f5f5f5; border: 1px solid #e0e0e0; color: #1a1a1a; padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 14px; border-radius: 8px; outline: none; transition: all 0.3s; }
        .giris:focus { border-color: #1a1a1a; background: #fff; }
        .gonder-btn { background: #1a1a1a; border: none; color: #fff; padding: 12px 20px; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; border-radius: 8px; letter-spacing: 2px; transition: all 0.3s; white-space: nowrap; }
        .gonder-btn:hover { background: #333; }

        .bos-ekran { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; background: #f5f5f5; }
        .bos-logo { font-size: 28px; font-weight: bold; letter-spacing: 8px; margin-bottom: 8px; color: #ddd; }
        .bos-alt { font-size: 11px; letter-spacing: 4px; color: #ccc; }
        .yukluyor { color: #aaa; font-size: 12px; letter-spacing: 2px; animation: titresin 1s infinite; }
        @keyframes titresin { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 600px) {
            .sol-panel { display: none; }
            .sol-panel.acik { display: flex; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; width: 280px; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
            .menu-btn { display: flex; }
            .ust-bar { padding: 12px 16px; }
            .alt-alan { padding: 12px 16px; }
            .mesaj-icerik { max-width: 90%; }
        }
        .menu-btn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; color: #1a1a1a; padding: 4px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 99; }
        .overlay.acik { display: block; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="menuKapat()"></div>
    
    <div class="sol-panel" id="sol-panel">
        <div class="logo">J.A.R.V.İ.S. 1453</div>
        <button class="yeni-btn" onclick="yeniSohbet()">+ YENİ SOHBET</button>
        <div class="sohbet-listesi" id="sohbet-listesi"></div>
    </div>

    <div class="sag-panel">
        <div class="ust-bar">
            <button class="menu-btn" onclick="menuAc()">☰</button>
            <div class="arc-mini"><div class="arc-mini-ic"></div></div>
            <div class="aktif-sohbet-isim" id="aktif-isim">SOHBET SEÇİN</div>
            <a href="/cikis" class="cikis-btn">ÇIKIŞ</a>
        </div>
        <div id="ana-alan" class="bos-ekran">
            <div class="bos-logo">J.A.R.V.İ.S.</div>
            <div class="bos-alt">1453</div>
        </div>
        <div class="alt-alan">
            <input class="giris" id="giris" placeholder="Komut girin efendim..." onkeypress="enterKontrol(event)">
            <button class="gonder-btn" onclick="gonder()">GÖNDER</button>
        </div>
    </div>

    <script>
        let aktifSohbetId = null;

        function menuAc() {
            document.getElementById('sol-panel').classList.add('acik');
            document.getElementById('overlay').classList.add('acik');
        }
        function menuKapat() {
            document.getElementById('sol-panel').classList.remove('acik');
            document.getElementById('overlay').classList.remove('acik');
        }

        async function sohbetleriYukle() {
            const res = await fetch('/sohbetler');
            const sohbetler = await res.json();
            const liste = document.getElementById('sohbet-listesi');
            liste.innerHTML = '';
            Object.entries(sohbetler).reverse().forEach(([id, s]) => {
                const div = document.createElement('div');
                div.className = 'sohbet-item' + (id === aktifSohbetId ? ' aktif' : '');
                div.innerHTML = `
                    <span class="sohbet-isim">${s.isim}</span>
                    <button class="duzenle-btn" onclick="isimDuzenle('${id}', this.previousElementSibling)">✎</button>
                    <button class="sil-btn" onclick="sohbetSil('${id}')">✕</button>
                `;
                div.querySelector('.sohbet-isim').addEventListener('click', () => { sohbetAc(id); menuKapat(); });
                liste.appendChild(div);
            });
        }

        async function yeniSohbet() {
            const res = await fetch('/yeni_sohbet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({isim: 'Yeni Sohbet'})
            });
            const veri = await res.json();
            aktifSohbetId = veri.id;
            await sohbetleriYukle();
            await sohbetAc(veri.id);
            menuKapat();
        }

        async function sohbetAc(id) {
            aktifSohbetId = id;
            const res = await fetch('/sohbetler');
            const sohbetler = await res.json();
            const sohbet = sohbetler[id];
            if (!sohbet) return;
            document.getElementById('aktif-isim').textContent = sohbet.isim.toUpperCase();
            const alan = document.getElementById('ana-alan');
            alan.className = 'chat-alan';
            alan.innerHTML = '';
            if (sohbet.mesajlar && sohbet.mesajlar.length > 0) {
                sohbet.mesajlar.forEach(m => mesajEkle(m.content, m.role === 'user' ? 'user' : 'jarvis', false));
            } else {
                mesajEkle('Sistemler hazır efendim. Size nasıl yardımcı olabilirim?', 'jarvis', false);
            }
            alan.scrollTop = alan.scrollHeight;
            sohbetleriYukle();
        }

        function mesajEkle(metin, tip, scroll = true) {
            const alan = document.getElementById('ana-alan');
            const div = document.createElement('div');
            div.className = 'mesaj ' + tip;
            div.innerHTML = `<div class="mesaj-etiket">${tip === 'jarvis' ? '> JARVIS' : '> SEN'}</div><div class="mesaj-icerik">${metin}</div>`;
            alan.appendChild(div);
            if (scroll) alan.scrollTop = alan.scrollHeight;
        }

        async function gonder() {
            if (!aktifSohbetId) { alert('Lütfen bir sohbet seçin!'); return; }
            const giris = document.getElementById('giris');
            const komut = giris.value.trim();
            if (!komut) return;
            giris.value = '';
            mesajEkle(komut, 'user');
            const yukluyor = document.createElement('div');
            yukluyor.className = 'mesaj jarvis';
            yukluyor.innerHTML = '<div class="mesaj-etiket">> JARVIS</div><div class="mesaj-icerik yukluyor">İşleniyor...</div>';
            document.getElementById('ana-alan').appendChild(yukluyor);
            document.getElementById('ana-alan').scrollTop = document.getElementById('ana-alan').scrollHeight;
            const res = await fetch('/komut', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({komut, sohbet_id: aktifSohbetId})
            });
            const veri = await res.json();
            yukluyor.remove();
            mesajEkle(veri.cevap, 'jarvis');
        }

        async function sohbetSil(id) {
            await fetch('/sohbet_sil', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            if (aktifSohbetId === id) {
                aktifSohbetId = null;
                document.getElementById('ana-alan').className = 'bos-ekran';
                document.getElementById('ana-alan').innerHTML = '<div class="bos-logo">J.A.R.V.İ.S.</div><div class="bos-alt">1453</div>';
                document.getElementById('aktif-isim').textContent = 'SOHBET SEÇİN';
            }
            sohbetleriYukle();
        }

        function isimDuzenle(id, span) {
            const mevcutIsim = span.textContent;
            const input = document.createElement('input');
            input.className = 'sohbet-isim-input';
            input.value = mevcutIsim;
            span.replaceWith(input);
            input.focus();
            input.addEventListener('blur', async () => {
                const yeniIsim = input.value.trim() || mevcutIsim;
                await fetch('/sohbet_isim', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, isim: yeniIsim})
                });
                if (aktifSohbetId === id) document.getElementById('aktif-isim').textContent = yeniIsim.toUpperCase();
                sohbetleriYukle();
            });
            input.addEventListener('keypress', e => { if (e.key === 'Enter') input.blur(); });
        }

        function enterKontrol(e) { if (e.key === 'Enter') gonder(); }

        sohbetleriYukle();
    </script>
</body>
</html>
