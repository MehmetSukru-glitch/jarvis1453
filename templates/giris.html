<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.İ.S. 1453 — Giriş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; color: #1a1a1a; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .kart { width: 100%; max-width: 400px; border: 1px solid #ddd; border-radius: 12px; padding: 40px 32px; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .logo { font-size: 20px; font-weight: bold; letter-spacing: 4px; text-align: center; margin-bottom: 6px; color: #1a1a1a; }
        .arc { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; animation: don 6s linear infinite; }
        @keyframes don { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .arc-ic { width: 28px; height: 28px; border-radius: 50%; background: #1a1a1a; animation: parlat 1.5s infinite; }
        @keyframes parlat { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sekmeler { display: flex; margin-bottom: 24px; border-bottom: 1px solid #ddd; }
        .sekme { flex: 1; padding: 10px; text-align: center; font-size: 11px; letter-spacing: 2px; cursor: pointer; color: #999; transition: all 0.3s; }
        .sekme.aktif { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; }
        input { width: 100%; background: #f9f9f9; border: 1px solid #ddd; color: #1a1a1a; padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 14px; border-radius: 6px; outline: none; margin-bottom: 12px; transition: all 0.3s; }
        input:focus { border-color: #1a1a1a; background: #fff; }
        input::placeholder { color: #aaa; }
        button { width: 100%; background: #1a1a1a; border: none; color: #fff; padding: 14px; font-family: 'Courier New', monospace; font-size: 13px; cursor: pointer; border-radius: 6px; letter-spacing: 2px; margin-top: 8px; transition: all 0.3s; }
        button:hover { background: #333; }
        .hata { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }
    </style>
</head>
<body>
    <div class="kart">
        <div class="arc"><div class="arc-ic"></div></div>
        <div class="logo">J.A.R.V.İ.S. 1453</div>
        <p style="text-align:center;font-size:11px;color:#999;letter-spacing:2px;margin-bottom:28px">KİMLİK DOĞRULAMA</p>
        <div class="sekmeler">
            <div class="sekme aktif" onclick="sekmeAc('giris')">GİRİŞ</div>
            <div class="sekme" onclick="sekmeAc('kayit')">KAYIT OL</div>
        </div>
        <div id="giris-form">
            <input type="text" id="giris-kullanici" placeholder="Kullanıcı adı veya email">
            <input type="password" id="giris-sifre" placeholder="Şifre" onkeypress="enterKontrol(event, 'giris')">
            <button onclick="girisYap()">SİSTEME GİR</button>
        </div>
        <div id="kayit-form" style="display:none">
            <input type="text" id="kayit-kullanici" placeholder="Kullanıcı adı">
            <input type="email" id="kayit-email" placeholder="Email adresi">
            <input type="password" id="kayit-sifre" placeholder="Şifre" onkeypress="enterKontrol(event, 'kayit')">
            <button onclick="kayitOl()">HESAP OLUŞTUR</button>
        </div>
        <div class="hata" id="hata"></div>
    </div>
    <script>
        function sekmeAc(sekme) {
            document.querySelectorAll('.sekme').forEach((s, i) => s.classList.toggle('aktif', (i === 0) === (sekme === 'giris')));
            document.getElementById('giris-form').style.display = sekme === 'giris' ? 'block' : 'none';
            document.getElementById('kayit-form').style.display = sekme === 'kayit' ? 'block' : 'none';
            document.getElementById('hata').textContent = '';
        }
        async function girisYap() {
            const kullanici_adi = document.getElementById('giris-kullanici').value.trim();
            const sifre = document.getElementById('giris-sifre').value;
            if (!kullanici_adi || !sifre) { document.getElementById('hata').textContent = 'Tüm alanları doldurun!'; return; }
            const res = await fetch('/giris', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({kullanici_adi, sifre})
            });
            const veri = await res.json();
            if (veri.ok) { window.location.href = '/'; }
            else { document.getElementById('hata').textContent = veri.mesaj; }
        }
        async function kayitOl() {
            const kullanici_adi = document.getElementById('kayit-kullanici').value.trim();
            const email = document.getElementById('kayit-email').value.trim();
            const sifre = document.getElementById('kayit-sifre').value;
            if (!kullanici_adi || !email || !sifre) { document.getElementById('hata').textContent = 'Tüm alanları doldurun!'; return; }
            const res = await fetch('/kayit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({kullanici_adi, email, sifre})
            });
            const veri = await res.json();
            if (veri.ok) { window.location.href = '/'; }
            else { document.getElementById('hata').textContent = veri.mesaj; }
        }
        function enterKontrol(e, tip) {
            if (e.key === 'Enter') tip === 'giris' ? girisYap() : kayitOl();
        }
    </script>
</body>
</html>
